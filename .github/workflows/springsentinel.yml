name: SpringSentinel

on:
  push:
  pull_request:

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Run SpringSentinel
        run: |
          mvn -B io.github.pagano-antonio:spring-sentinel-maven-plugin:audit

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: target/spring-sentinel-reports/report.sarif
